name: Soil Detection CI

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Backend Dependencies
    run: |
      cd backend
      pip install -r requirements.txt

  - name: Check Backend Imports
    run: |
      cd backend
      python -c "import app"

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install Frontend Dependencies
    run: |
      cd frontend/my-app
      npm install

  - name: Build Frontend
    run: |
      cd frontend/my-app
      npm run build
```
